apiVersion: v1
kind: Pod
metadata:
  name: pod-in-namespace-a
  namespace: namespace-a
  labels:
    app: myapp
spec:
  containers:
  - name: app
    image: nginx:1.7.9
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-in-namespace-b
  namespace: namespace-b
  labels:
    app: myapp
spec:
  containers:
  - name: app
    image: nginx:1.7.9
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-in-namespace-a
  namespace: namespace-a
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: label-policy-in-namespace-a
  namespace: namespace-a
spec:
  podSelector:
    matchLabels:
      app: myapp
  policyTypes:
  - Ingress
