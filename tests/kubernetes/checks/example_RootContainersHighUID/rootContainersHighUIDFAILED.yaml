# Pod runAsUser not set, container runAsUser not set or < 10000 (FAILED)
apiVersion: v1
kind: Pod
metadata:
  name: pod1
spec:
  containers:
  - name: main
    image: alpine
    command: ["/bin/sleep", "999999"]
---
# Pod runAsUser not set, container runAsUser not set or < 10000 (FAILED)
apiVersion: v1
kind: Pod
metadata:
  name: pod2
spec:
  containers:
  - name: main
    image: alpine
    command: ["/bin/sleep", "999999"]
    securityContext:
      runAsUser: 0
---
# Pod runAsUser >= 10000, override at container < 10000 (FAILED)
apiVersion: v1
kind: Pod
metadata:
  name: pod3
spec:
  securityContext:
    runAsUser: 11000
  containers:
  - name: main
    image: alpine
    command: ["/bin/sleep", "999999"]
  - name: main2
    image: alpine
    command: ["/bin/sleep", "999999"]
    securityContext:
      runAsUser: 0
---
# Pod runAsUser < 10000, no override at container (FAILED)
apiVersion: v1
kind: Pod
metadata:
  name: pod4
spec:
  securityContext:
    runAsUser: 1000
  containers:
  - name: main
    image: alpine
    command: ["/bin/sleep", "999999"]
  - name: main2
    image: alpine
    command: ["/bin/sleep", "999999"]
---
# Pod runAsUser is not an integer (FAILED)
apiVersion: v1
kind: Pod
metadata:
  name: pod4
spec:
  securityContext:
    runAsUser: username
  containers:
  - name: main
    image: alpine
    command: ["/bin/sleep", "999999"]
  - name: main2
    image: alpine
    command: ["/bin/sleep", "999999"]
---
# Pod securityContext is not a dict (FAILED)
apiVersion: v1
kind: Pod
metadata:
  name: pod4
spec:
  securityContext:
    runAsUser:65534
    fsGroup:65534
  containers:
  - name: main
    image: alpine
    command: ["/bin/sleep", "999999"]
  - name: main2
    image: alpine
    command: ["/bin/sleep", "999999"]
---
# hostUsers: true keeps the host user namespace, so the high-UID check still
# applies and a missing runAsUser must FAIL (guards the hostUsers exemption)
apiVersion: v1
kind: Pod
metadata:
  name: pod5
spec:
  hostUsers: true
  containers:
  - name: main
    image: alpine
    command: ["/bin/sleep", "999999"]
